name: sub2api-app-worker
version: 0.2.0
protocol: sub2api-worker-v1
runtime: python-fastapi
routes:
  health: /health
  runs:
    - /runs
    - /text/runs
    - /prompt/runs
    - /image/runs
    - /workflow/runs
    - /audio/runs
    - /video/runs
    - /grok-video/runs
    - /product-marketing/runs
    - /academic-paper/runs
  cancel: /cancel
capabilities:
  - text
  - vision
  - image_generation
  - image_edit
  - audio_speech
  - audio_transcription
  - audio_translation
  - video_generation
  - grok_video_generation
  - product_marketing
  - academic_paper
  - workflow
input_schema:
  type: object
  properties:
    prompt:
      type: string
      title: Prompt
      x-input-kind: textarea
  required:
    - prompt
output_schema:
  type: object
  properties:
    result:
      type: string
node_model_policy:
  text.generate:
    node_id: text
    role: generate
    capability: text
    required: true
